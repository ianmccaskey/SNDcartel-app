name: Sweep payments

# Runs every 5 minutes (GitHub Actions cron minimum) and pokes the production
# sweep endpoint. The endpoint itself decides whether there's anything to sweep
# based on the set of active group_buys.
#
# Cost: well under Alchemy free tier even at this frequency — see
# PROJECT_COMPLETION_PLAN.md "Pending operational tasks" for the math.
#
# Required GitHub Actions secrets:
#   CRON_SECRET — the shared bearer token. Must match the CRON_SECRET set in
#                 DigitalOcean App Platform environment variables. Generate
#                 once via `openssl rand -hex 32`.
#
# To pause the schedule without removing the file, comment out the schedule
# trigger below.

on:
  schedule:
    # Every 5 minutes (GitHub Actions cron minimum granularity). UTC, with up
    # to a few minutes of jitter during platform load. The 6h sweep window
    # inside the endpoint covers any missed/late runs idempotently.
    - cron: '*/5 * * * *'
  workflow_dispatch: # allow manual trigger from the Actions tab

jobs:
  sweep:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Invoke sweep endpoint
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          curl --fail \
            --silent \
            --show-error \
            --max-time 240 \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            -X POST \
            https://sndcartel-app-clo2c.ondigitalocean.app/api/cron/sweep-payments
